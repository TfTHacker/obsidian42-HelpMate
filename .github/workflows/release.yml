name: Release Obsidian plugin

on:
  push:
    tags:
      - '*'
  workflow_run:
    workflows:
      - Bump version on dependency change
    types:
      - completed
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without creating a GitHub release"
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '21.x'

      - name: Build plugin
        run: |
          npm install
          npm run build

      - name: Create release
        if: github.event.inputs.dry_run != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${GITHUB_REF#refs/tags/}" != "${GITHUB_REF}" ]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="$(node -p "require('./manifest.json').version")"
          fi

          gh release create "$tag" \
            --title="$tag" \
            build/main.js manifest.json styles.css
